<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族のTodo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      color: #3d2b1f;
      margin-bottom: 24px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border: 2px solid #d4b8a0;
      border-radius: 8px;
      font-size: 1rem;
      background: #fff;
      outline: none;
    }

    .input-area input:focus {
      border-color: #a0714f;
    }

    .input-area button {
      padding: 12px 18px;
      background: #a0714f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    .input-area button:hover {
      background: #7d5538;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 14px 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #a0714f;
      flex-shrink: 0;
    }

    .todo-item label {
      flex: 1;
      font-size: 1rem;
      color: #3d2b1f;
      cursor: pointer;
    }

    .todo-item.done label {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 4px;
    }

    .todo-item .delete-btn:hover {
      color: #e07070;
    }

    .empty {
      text-align: center;
      color: #bbb;
      margin-top: 40px;
      font-size: 0.95rem;
    }

    .status {
      text-align: center;
      font-size: 0.8rem;
      color: #bbb;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <h1>🏠 家族のTodo</h1>
  <p class="status" id="status">接続中...</p>

  <div class="input-area">
    <input type="text" id="new-todo" placeholder="やることを入力..." />
    <button onclick="addTodo()">追加</button>
  </div>

  <ul class="todo-list" id="todo-list"></ul>
  <p class="empty" id="empty-msg" style="display:none">やることはありません 🎉</p>

  <!-- Firebase SDK (scriptタグ版) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHjpD3vC_bl_vEoymo1ga90Fg2dj3PdGc",
      authDomain: "family-todo-tomorrow.firebaseapp.com",
      databaseURL: "https://family-todo-tomorrow-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "family-todo-tomorrow",
      storageBucket: "family-todo-tomorrow.firebasestorage.app",
      messagingSenderId: "705055892377",
      appId: "1:705055892377:web:ff306a6c7f154bf4b4e908"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const todosRef = ref(db, 'todos');

    document.getElementById('status').textContent = '✅ 接続済み';

    // リアルタイムでリスト表示
    onValue(todosRef, (snapshot) => {
      const list = document.getElementById('todo-list');
      const emptyMsg = document.getElementById('empty-msg');
      list.innerHTML = '';

      const data = snapshot.val();
      if (!data) {
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';

      Object.entries(data).forEach(([id, todo]) => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.done ? ' done' : '');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.id = 'cb-' + id;
        checkbox.addEventListener('change', () => {
          update(ref(db, 'todos/' + id), { done: checkbox.checked });
        });

        const label = document.createElement('label');
        label.htmlFor = 'cb-' + id;
        label.textContent = todo.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => {
          remove(ref(db, 'todos/' + id));
        });

        li.appendChild(checkbox);
        li.appendChild(label);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    });

    // Todo追加
    window.addTodo = function() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      push(todosRef, { text: text, done: false });
      input.value = '';
    };

    // Enterキーでも追加
    document.getElementById('new-todo').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.addTodo();
    });
  </script>

</body>
</html>
