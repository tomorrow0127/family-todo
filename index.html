<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族のTodo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* パスワード画面 */
    #password-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 16px;
    }
    #password-screen h1 { font-size: 1.4rem; color: #3d2b1f; }
    #password-screen input {
      padding: 12px;
      border: 2px solid #d4b8a0;
      border-radius: 8px;
      font-size: 1rem;
      width: 200px;
      text-align: center;
      outline: none;
    }
    #password-screen input:focus { border-color: #a0714f; }
    #password-screen button {
      padding: 12px 24px;
      background: #a0714f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    #password-error { color: #e07070; font-size: 0.9rem; display: none; }

    /* メイン画面 */
    #main-screen { display: none; }

    h1 { text-align: center; font-size: 1.4rem; color: #3d2b1f; margin-bottom: 16px; }

    /* カテゴリタブ */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1;
      padding: 10px;
      border: 2px solid #d4b8a0;
      border-radius: 8px;
      background: white;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      color: #a0714f;
      font-weight: bold;
    }
    .tab.active { background: #a0714f; color: white; border-color: #a0714f; }

    /* 入力エリア */
    .input-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .input-row { display: flex; gap: 8px; }
    .input-area input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 2px solid #d4b8a0;
      border-radius: 8px;
      font-size: 1rem;
      background: #fff;
      outline: none;
    }
    .input-area input[type="text"]:focus { border-color: #a0714f; }
    .input-area button {
      padding: 12px 18px;
      background: #a0714f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .input-area button:hover { background: #7d5538; }

    /* ラベルボタン群（入力・絞り込み共通） */
    .label-btns {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
    }
    .label-btns.visible { display: flex; }
    .label-btn {
      padding: 6px 12px;
      border: 2px solid #d4b8a0;
      border-radius: 20px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      color: #7d5538;
    }
    .label-btn.selected { background: #a0714f; color: white; border-color: #a0714f; }

    /* 絞り込みエリア */
    .filter-area {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .filter-area.visible { display: flex; }
    .filter-label { font-size: 0.8rem; color: #a0714f; font-weight: bold; }

    /* Todoリスト */
    .todo-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .todo-item input[type="checkbox"] {
      width: 20px; height: 20px;
      cursor: pointer;
      accent-color: #a0714f;
      flex-shrink: 0;
    }
    .todo-item .todo-text { flex: 1; font-size: 1rem; color: #3d2b1f; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #aaa; }

    .todo-label-tag {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f0e6da;
      color: #7d5538;
      white-space: nowrap;
    }

    .todo-controls { display: flex; flex-direction: column; gap: 2px; }
    .move-btn {
      background: none;
      border: 1px solid #d4b8a0;
      border-radius: 4px;
      width: 24px; height: 22px;
      cursor: pointer;
      font-size: 0.7rem;
      color: #a0714f;
      line-height: 1;
    }
    .move-btn:hover { background: #f0e6da; }
    .move-btn:disabled { opacity: 0.3; cursor: default; }

    .icon-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .icon-btn:hover { color: #a0714f; }
    .icon-btn.delete:hover { color: #e07070; }

    /* 編集モード */
    .todo-item .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 2px solid #a0714f;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
    }

    /* 編集時ラベル選択 */
    .edit-label-row {
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 14px;
      background: #faf6f2;
      border-radius: 0 0 10px 10px;
      margin-top: -10px;
    }
    .edit-label-row.visible { display: flex; }

    .empty { text-align: center; color: #bbb; margin-top: 40px; font-size: 0.95rem; }
    .status { text-align: center; font-size: 0.8rem; color: #bbb; margin-bottom: 12px; }
  </style>
</head>
<body>

  <!-- パスワード画面 -->
  <div id="password-screen">
    <h1>🏠 家族のTodo</h1>
    <input type="password" id="password-input" placeholder="パスワードを入力" />
    <button onclick="checkPassword()">ログイン</button>
    <p id="password-error">パスワードが違います</p>
  </div>

  <!-- メイン画面 -->
  <div id="main-screen">
    <h1>🏠 家族のTodo</h1>
    <p class="status" id="status">接続中...</p>

    <div class="tabs">
      <button class="tab active" id="tab-かいもの" onclick="switchTab('かいもの', this)">🛒 かいもの</button>
      <button class="tab" id="tab-おでかけ" onclick="switchTab('おでかけ', this)">🚗 おでかけ</button>
    </div>

    <!-- 入力エリア -->
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="new-todo" placeholder="やることを入力..." />
        <button onclick="addTodo()">追加</button>
      </div>
      <div class="label-btns visible" id="input-label-btns">
        <button class="label-btn selected" onclick="selectInputLabel(this, '')">ラベルなし</button>
        <button class="label-btn" onclick="selectInputLabel(this, 'コストコ')">コストコ</button>
        <button class="label-btn" onclick="selectInputLabel(this, '無印良品')">無印良品</button>
        <button class="label-btn" onclick="selectInputLabel(this, 'カルディ')">カルディ</button>
        <button class="label-btn" onclick="selectInputLabel(this, 'ダイレックス')">ダイレックス</button>
      </div>
    </div>

    <!-- 絞り込みエリア -->
    <div class="filter-area visible" id="filter-area">
      <span class="filter-label">🔍 絞り込み</span>
      <div class="label-btns visible" id="filter-label-btns">
        <button class="label-btn selected" onclick="selectFilterLabel(this, '')">すべて</button>
        <button class="label-btn" onclick="selectFilterLabel(this, 'コストコ')">コストコ</button>
        <button class="label-btn" onclick="selectFilterLabel(this, '無印良品')">無印良品</button>
        <button class="label-btn" onclick="selectFilterLabel(this, 'カルディ')">カルディ</button>
        <button class="label-btn" onclick="selectFilterLabel(this, 'ダイレックス')">ダイレックス</button>
      </div>
    </div>

    <ul class="todo-list" id="todo-list"></ul>
    <p class="empty" id="empty-msg" style="display:none">やることはありません 🎉</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHjpD3vC_bl_vEoymo1ga90Fg2dj3PdGc",
      authDomain: "family-todo-tomorrow.firebaseapp.com",
      databaseURL: "https://family-todo-tomorrow-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "family-todo-tomorrow",
      storageBucket: "family-todo-tomorrow.firebasestorage.app",
      messagingSenderId: "705055892377",
      appId: "1:705055892377:web:ff306a6c7f154bf4b4e908"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentTab = 'かいもの';
    let selectedInputLabel = '';
    let selectedFilterLabel = '';
    let todosData = {};

    // パスワード
    window.checkPassword = function() {
      const input = document.getElementById('password-input').value;
      if (input === 'chi') {
        document.getElementById('password-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        initApp();
      } else {
        document.getElementById('password-error').style.display = 'block';
      }
    };
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.checkPassword();
    });

    function initApp() {
      const todosRef = ref(db, 'todos');
      document.getElementById('status').textContent = '✅ 接続済み';
      onValue(todosRef, snapshot => {
        todosData = snapshot.val() || {};
        renderList();
      });
    }

    // タブ切り替え
    window.switchTab = function(tab, btn) {
      currentTab = tab;
      selectedFilterLabel = '';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');

      const isKaimono = tab === 'かいもの';
      document.getElementById('input-label-btns').classList.toggle('visible', isKaimono);
      document.getElementById('filter-area').classList.toggle('visible', isKaimono);

      // 絞り込みリセット
      document.querySelectorAll('#filter-label-btns .label-btn').forEach(b => b.classList.remove('selected'));
      document.querySelector('#filter-label-btns .label-btn').classList.add('selected');

      renderList();
    };

    // 入力ラベル選択
    window.selectInputLabel = function(btn, label) {
      selectedInputLabel = label;
      document.querySelectorAll('#input-label-btns .label-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };

    // 絞り込みラベル選択
    window.selectFilterLabel = function(btn, label) {
      selectedFilterLabel = label;
      document.querySelectorAll('#filter-label-btns .label-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      renderList();
    };

    // リスト描画
    function renderList() {
      const list = document.getElementById('todo-list');
      const emptyMsg = document.getElementById('empty-msg');
      list.innerHTML = '';

      let filtered = Object.entries(todosData)
        .filter(([, t]) => t.category === currentTab)
        .sort((a, b) => (a[1].order ?? 0) - (b[1].order ?? 0));

      // 絞り込み
      if (selectedFilterLabel) {
        filtered = filtered.filter(([, t]) => t.label === selectedFilterLabel);
      }

      if (filtered.length === 0) {
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';

      filtered.forEach(([id, todo], index) => {
        // アイテム本体
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.done ? ' done' : '');
        li.dataset.id = id;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.addEventListener('change', () => {
          update(ref(db, 'todos/' + id), { done: checkbox.checked });
        });

        const textSpan = document.createElement('span');
        textSpan.className = 'todo-text';
        textSpan.textContent = todo.text;

        // ラベルタグ
        const tag = document.createElement('span');
        tag.className = 'todo-label-tag';
        tag.style.display = todo.label ? '' : 'none';
        tag.textContent = todo.label || '';

        // 上下ボタン
        const controls = document.createElement('div');
        controls.className = 'todo-controls';
        const upBtn = document.createElement('button');
        upBtn.className = 'move-btn';
        upBtn.textContent = '▲';
        upBtn.disabled = index === 0;
        upBtn.addEventListener('click', () => moveItem(filtered, index, -1));
        const downBtn = document.createElement('button');
        downBtn.className = 'move-btn';
        downBtn.textContent = '▼';
        downBtn.disabled = index === filtered.length - 1;
        downBtn.addEventListener('click', () => moveItem(filtered, index, 1));
        controls.appendChild(upBtn);
        controls.appendChild(downBtn);

        // 編集ボタン
        const editBtn = document.createElement('button');
        editBtn.className = 'icon-btn';
        editBtn.textContent = '✏️';
        editBtn.title = '編集';
        editBtn.addEventListener('click', () => startEdit(li, id, todo));

        // 削除ボタン
        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn delete';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => remove(ref(db, 'todos/' + id)));

        li.appendChild(checkbox);
        li.appendChild(textSpan);
        li.appendChild(tag);
        li.appendChild(controls);
        li.appendChild(editBtn);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    // 編集開始
    function startEdit(li, id, todo) {
      // テキストをinputに置き換え
      const textSpan = li.querySelector('.todo-text');
      const tag = li.querySelector('.todo-label-tag');
      const editBtn = li.querySelectorAll('.icon-btn')[0];
      const controls = li.querySelector('.todo-controls');

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'edit-input';
      input.value = todo.text;
      li.replaceChild(input, textSpan);
      tag.style.display = 'none';

      // 編集ボタンを保存ボタンに
      editBtn.textContent = '💾';
      editBtn.title = '保存';

      // かいものカテゴリのときラベル編集行を追加
      let editLabelRow = null;
      let editSelectedLabel = todo.label || '';

      if (currentTab === 'かいもの') {
        editLabelRow = document.createElement('div');
        editLabelRow.className = 'edit-label-row visible';
        const labels = ['ラベルなし', 'コストコ', '無印良品', 'カルディ', 'ダイレックス'];
        labels.forEach(l => {
          const val = l === 'ラベルなし' ? '' : l;
          const b = document.createElement('button');
          b.className = 'label-btn' + (editSelectedLabel === val ? ' selected' : '');
          b.textContent = l;
          b.addEventListener('click', () => {
            editSelectedLabel = val;
            editLabelRow.querySelectorAll('.label-btn').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
          });
          editLabelRow.appendChild(b);
        });
        li.after(editLabelRow);
      }

      // 保存処理
      const save = () => {
        const newText = input.value.trim();
        if (!newText) return;
        const updates = { text: newText };
        if (currentTab === 'かいもの') {
          updates.label = editSelectedLabel;
        }
        update(ref(db, 'todos/' + id), updates);
        if (editLabelRow) editLabelRow.remove();
      };

      editBtn.replaceWith(editBtn.cloneNode(true));
      const newEditBtn = li.querySelectorAll('.icon-btn')[0];
      newEditBtn.textContent = '💾';
      newEditBtn.addEventListener('click', save);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
      input.focus();
    }

    // 並び替え
    function moveItem(filtered, index, direction) {
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= filtered.length) return;
      const [idA, todoA] = filtered[index];
      const [idB, todoB] = filtered[targetIndex];
      update(ref(db, 'todos/' + idA), { order: todoB.order ?? targetIndex });
      update(ref(db, 'todos/' + idB), { order: todoA.order ?? index });
    }

    // Todo追加
    window.addTodo = function() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      const filtered = Object.values(todosData).filter(t => t.category === currentTab);
      const maxOrder = filtered.length > 0 ? Math.max(...filtered.map(t => t.order ?? 0)) : -1;
      const newTodo = { text, done: false, category: currentTab, order: maxOrder + 1 };
      if (currentTab === 'かいもの' && selectedInputLabel) {
        newTodo.label = selectedInputLabel;
      }
      push(ref(db, 'todos'), newTodo);
      input.value = '';
    };

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.addTodo();
    });
  </script>

</body>
</html>
